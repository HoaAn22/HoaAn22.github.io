<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Piano Theme Web</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #6E6E6E;
            color: #F8F8F8;
            margin: 0;
            padding: 0;
        }
        header, footer {
            background-color: #F8F8F8;
            color: #333333;
            text-align: center;
            padding: 20px;
        }
        .container {
            max-width: 900px;
            margin: 20px auto;
            background: #B2B2B2;
            padding: 20px;
            border-radius: 10px;
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.2);
        }
        .button {
            display: inline-block;
            background-color: #333333;
            color: #F8F8F8;
            padding: 10px 20px;
            text-decoration: none;
            border-radius: 5px;
            margin-top: 20px;
        }
        .button:hover {
            background-color: #6E6E6E;
        }
    </style>
</head>
<body>
    <header>
        <h1>Piano Music</h1>
    </header>
    <div class="container">
        <h2>Welcome to the World of Piano</h2>
        <p>Explore the elegance and beauty of piano music with our curated collection.</p>
        <a href="#" class="button">Discover More</a>
    </div>
    <footer>
        <p>&copy; 2025 Piano Theme. All rights reserved.</p>
    </footer>
</body>
</html>
