<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dark Mode Test with State Persistence</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            transition: background-color 0.3s, color 0.3s;
            padding: 20px;
        }
        body.dark-mode {
            background-color: #1a1a1a;
            color: #f0f0f0;
        }
        button {
            padding: 10px 15px;
            font-size: 16px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <h1>Dark Mode Test with State Persistence</h1>
    <p>This is a test paragraph. The dark mode state will be preserved even after page reload.</p>
    <button id="darkModeToggle">Toggle Dark Mode</button>

    <script>
        const darkModeToggle = document.getElementById('darkModeToggle');
        const body = document.body;

        // Function to set dark mode
        function setDarkMode(isDark) {
            if (isDark) {
                body.classList.add('dark-mode');
            } else {
                body.classList.remove('dark-mode');
            }
            localStorage.setItem('darkMode', isDark);
        }

        // Check for saved dark mode preference
        const savedDarkMode = localStorage.getItem('darkMode');

        // Apply the saved preference or default to light mode
        if (savedDarkMode === 'true') {
            setDarkMode(true);
        }

        // Toggle dark mode on button click
        darkModeToggle.addEventListener('click', () => {
            const isDarkMode = body.classList.toggle('dark-mode');
            setDarkMode(isDarkMode);
            console.log('Dark mode toggled:', isDarkMode);
        });
    </script>
</body>
</html>
