    <script>
        function renderMath() {
            if (window.MathJax && window.MathJax.Hub && MathJax.Hub.Queue) {
                // Nếu MathJax đã sẵn sàng, gọi để render các công thức toán học
                MathJax.Hub.Queue(["Typeset", MathJax.Hub]);
            } else {
                // Nếu MathJax chưa sẵn sàng, thử lại sau 100ms
                setTimeout(renderMath, 100);
            }
        }
    </script>    
    <script type="text/x-mathjax-config">
        init_mathjax = function() {
            if (window.MathJax) {
                MathJax.Hub.Config({
                    TeX: {
                        equationNumbers: { autoNumber: "AMS", useLabelIds: true }
                    },
                    tex2jax: {
                        inlineMath: [ ['$','$'], ["\\(","\\)"] ],
                        displayMath: [ ['$$','$$'], ["\\[","\\]"] ],
                        processEscapes: true,
                        processEnvironments: true
                    },
                    displayAlign: 'center',
                    messageStyle: 'none',
                    CommonHTML: { linebreaks: { automatic: true } }
                });
    
                // Gọi hàm renderMath để kiểm tra MathJax đã sẵn sàng chưa
                renderMath();
            }
        }
        init_mathjax();
    </script>
