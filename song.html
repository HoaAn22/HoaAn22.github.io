<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Wave Bars Header & Footer</title>
    <style>
        /* Định dạng chung cho thanh sóng âm */
        .wave-bars {
            position: absolute;
            display: flex;
            gap: 4px;
            z-index: 0;
        }

        .bar {
            width: 4px;
            height: 50px;
            background: linear-gradient(to top, rgba(0, 123, 255, 0.8), rgba(0, 123, 255, 0.2));
            animation: wave-animation 1.5s infinite ease-in-out;
            transition: opacity 0.3s ease;
        }

        /* Hiệu ứng sóng động */
        @keyframes wave-animation {
            0%, 100% {
                height: 40px;
            }
            50% {
                height: 60px;
            }
        }

        /* Định dạng riêng cho header */
        header {
            position: relative;
            padding: 20px;
            background: #f8f9fa;
        }

        header .wave-bars {
            top: 0;
            right: 0;
            flex-direction: row;
        }

        /* Định dạng riêng cho footer */
        footer {
            position: relative;
            padding: 20px;
            background: #343a40;
            color: white;
            text-align: center;
        }

        footer .wave-bars {
            bottom: 0;
            left: 0;
            flex-direction: row-reverse;
        }

        /* Hiệu ứng làm mờ khi gặp văn bản */
        .wave-bars::before, .wave-bars::after {
            content: "";
            position: absolute;
            width: 100%;
            height: 100%;
            backdrop-filter: blur(5px);
            opacity: 0.5;
        }
    </style>
</head>
<body>
    <header>
        <h1>Header Section</h1>
        <div class="wave-bars">
            <script>
                for (let i = 0; i < 20; i++) {
                    document.write('<div class="bar"></div>');
                }
            </script>
        </div>
    </header>

    <main>
        <p>Content goes here...</p>
    </main>

    <footer>
        <p>Footer Section</p>
        <div class="wave-bars">
            <script>
                for (let i = 0; i < 20; i++) {
                    document.write('<div class="bar"></div>');
                }
            </script>
        </div>
    </footer>
</body>
</html>
