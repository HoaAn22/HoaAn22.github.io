<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>An's Blog</title>
    <style>
        /* ===== RESET & BASE ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: Arial, sans-serif;
            line-height: 1.6;
        }
        header {
            position: relative;
            background-color: #f8f9fa;
            padding: 10px 20px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-wrap: wrap;
        }
        header h1 {
            font-size: 1.5rem;
            display: flex;
            align-items: center;
        }
        #headerMenu {
            display: none;
            margin-left: 10px;
            cursor: pointer;
        }
        nav {
            display: flex;
            gap: 20px;
        }
        nav ul {
            list-style: none;
            display: flex;
            gap: 20px;
        }
        nav ul li a {
            text-decoration: none;
            color: #333;
        }
        .dark-mode-toggle {
            display: flex;
            align-items: center;
        }
        .dark-mode-icon, .light-mode-icon {
            width: 24px;
            height: 24px;
            cursor: pointer;
        }

        /* ===== MOBILE STYLES ===== */
        @media (max-width: 768px) {
            nav {
                display: none;
                position: absolute;
                top: 100%;
                left: 0;
                width: 100%;
                background-color: #fff;
                border-top: 1px solid #ccc;
                padding: 10px 20px;
            }
            nav.show {
                display: block;
            }
            nav ul {
                flex-direction: column;
                gap: 10px;
            }
            #headerMenu {
                display: inline-block;
            }
        }
    </style>
</head>
<body>

    <header>
        <h1>An's blog
            <div id="headerMenu" style="font-size: 20px; border: 1.5px solid black; border-radius: 5px; padding: 5px; user-select: none; -webkit-user-drag: none;">…</div>
        </h1>
        <nav>
            <ul>
                <li><a href="index.html">Home</a></li>
                <li><a href="resources.html">Resources</a></li>
                <li><a href="about.html">About</a></li>
            </ul>
        </nav>
        <div id="darkModeToggle" class="dark-mode-toggle">
            <img src="assets/images/dark-mode.png" alt="Toggle Light Mode" class="dark-mode-icon">
            <img src="assets/images/light-mode.png" alt="Toggle Dark Mode" class="light-mode-icon">
        </div>
    </header>

    <main style="padding: 20px;">
        <h2>Welcome to An's Blog</h2>
        <p>This is a sample page to demonstrate the responsive header with toggle menu and dark mode icon layout.</p>
    </main>

    <script>
        const headerMenu = document.getElementById('headerMenu');
        const nav = document.querySelector('header nav');

        headerMenu.addEventListener('click', () => {
            nav.classList.toggle('show');
        });
    </script>
</body>
</html>
