<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Music Themed Layout</title>
    <style>
        body {
            background: linear-gradient(white, #f0f0f0);
            font-family: 'Bravura', 'Maestro', sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .container {
            max-width: 90%;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            padding: 20px;
            background: white;
            border-radius: 10px;
            border: 2px solid black;
            box-shadow: 0 0 20px rgba(0, 0, 0, 0.2);
            position: relative;
        }

        .layout {
            padding: 20px;
            background: linear-gradient(white, #ddd);
            border-radius: 8px;
            border: 1px solid black;
            box-shadow: 0 4px 10px rgba(0, 0, 0, 0.2);
            position: relative;
            text-align: center;
            font-size: 18px;
            font-weight: bold;
            transition: transform 0.2s ease-in-out;
        }

        .layout:hover {
            transform: scale(1.05);
            background: linear-gradient(#ddd, white);
        }

        .layout:first-child {
            grid-column: span 3;
            background: black;
            color: white;
        }

        .layout:nth-child(2) {
            grid-column: span 3;
            background: #222;
            color: white;
        }

        .layout:nth-child(3),
        .layout:nth-child(6) {
            grid-column: 1;
            background: white;
        }

        .layout:nth-child(4),
        .layout:nth-child(5) {
            grid-column: span 2;
            background: black;
            color: white;
        }

        /* Hiệu ứng dòng kẻ nhạc */
        .container::before {
            content: "";
            position: absolute;
            top: 50%;
            left: 0;
            width: 100%;
            height: 2px;
            background: black;
            box-shadow: 0 -20px black, 0 -40px black, 0 20px black, 0 40px black;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="layout">Header</div>
        <div class="layout">Sub-header</div>
        <div class="layout">Note 1</div>
        <div class="layout">Note 2</div>
        <div class="layout">Note 3</div>
        <div class="layout">Note 4</div>
    </div>
</body>
</html>
